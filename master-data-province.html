}

<script type="text/babel" data-presets="react">
const { useState, useMemo, useEffect, useRef } = React;

function regionOf(id) { return window.REGIONS.find(r => r.id === id); }
function uid(prefix='x') { return prefix + '-' + Math.random().toString(36).slice(2, 9); }

function PaneRow({ item, meta, active, onSelect, onEdit, onDelete, secondary }) {
  return (
    <div onClick={onSelect}
      className={`row-hover group cursor-pointer flex items-center gap-2 px-3 py-2 rounded-md text-[13px] transition-colors ${active ? 'row-active' : 'text-ink-700 hover:bg-[#4790FF]/[0.06] hover:text-ink-900'}`}>
      <div className="flex-1 min-w-0">
        <div className="truncate">{item.nameTh}</div>
        {secondary && <div className="text-[11px] text-ink-700/50 truncate">{secondary}</div>}
      </div>
      {meta !== undefined && <span className="shrink-0 text-[10.5px] font-mono text-ink-700/45 mr-1">{meta}</span>}
      <div className="flex items-center gap-1 shrink-0">
        <button onClick={e => { e.stopPropagation(); onEdit(); }} title="Edit"
          className="w-7 h-7 rounded-md flex items-center justify-center bg-pb-50/60 text-pb-700 hover:bg-pb-100 hover:text-pb-900 transition-colors">
          <Icon name="pencil" size={13} />
        </button>
        <button onClick={e => { e.stopPropagation(); onDelete(); }} title="Delete"
          className="w-7 h-7 rounded-md flex items-center justify-center bg-rose-50/60 text-rose-600 hover:bg-rose-100 hover:text-rose-700 transition-colors">
          <Icon name="trash" size={13} />
        </button>
      </div>
      {active && <Icon name="chev-right" size={12} className="shrink-0 text-pb-700" />}
    </div>
  );
}

function Pane({ title, count, subtitle, onAdd, search, onSearch, children, empty }) {
  return (
    <div className="flex flex-col bg-white border border-surface-200 rounded-xl overflow-hidden"
      style={{ boxShadow: '0 1px 3px rgba(11,20,48,.06), 0 1px 2px rgba(11,20,48,.04)' }}>
      <div className="px-3 py-3 border-b border-surface-200 shrink-0">
        <div className="flex items-center gap-2 mb-2">
          <span className="text-[12px] font-semibold text-ink-900">{title}</span>
          <span className="text-[10.5px] font-mono text-white bg-pb-900 rounded-full px-2 py-0.5">{count}</span>
          <button onClick={onAdd}
            className="ml-auto h-7 px-2 rounded-md bg-pb-50 text-pb-700 hover:bg-pb-100 text-[11px] font-semibold flex items-center gap-1">
            <Icon name="plus" size={12} /> Add
          </button>
        </div>
        {subtitle && <div className="text-[11px] text-ink-700/55 truncate">{subtitle}</div>}
        {onSearch !== undefined && (
          <div className="relative mt-2">
            <Icon name="search" size={13} className="absolute left-2.5 top-1/2 -translate-y-1/2 text-ink-700/35" />
            <input value={search} onChange={e => onSearch(e.target.value)} placeholder="ค้นหา..."
              className="w-full h-7 pl-8 pr-2 bg-surface-50 border border-surface-200 rounded-md text-[12px] outline-none focus:border-pb-500 focus:bg-white" />
          </div>
        )}
      </div>
      <div className="flex-1 overflow-y-auto pane-scroll px-1.5 py-1.5 space-y-0.5" style={{ minHeight: 0 }}>
        {React.Children.count(children) === 0
          ? <div className="px-3 py-10 text-center text-[12px] text-ink-700/40">{empty || 'ไม่มีข้อมูล'}</div>
          : children}
      </div>
    </div>
  );
}

  if (!subdistrict) {
    return (
      <div className="bg-white border border-surface-200 rounded-xl p-6 flex flex-col items-center justify-center text-center min-h-[320px]"

          <Icon name="chart-bar" size={24} className="text-pb-500" />
        </div>

        <div className="text-[12px] text-ink-700/55 max-w-xs leading-relaxed">

        </div>

function ProvinceSortModal({ open, onClose, provinces, regions, onSave }) {
  const [regionId, setRegionId] = useState('');
  const [list, setList] = useState([]);
  const dragIdx = useRef(null);
  const [hoverIdx, setHoverIdx] = useState(null);

  useEffect(() => {
    if (!open) return;
    setRegionId('');
    setList([]);
    setHoverIdx(null);
  }, [open]);

  useEffect(() => {
    if (regionId) setList(provinces.filter(p => p.region === regionId));
    else setList([]);
  }, [regionId, provinces]);

  if (!open) return null;

  const onDragStart = (i) => (e) => {
    dragIdx.current = i;
    e.dataTransfer.effectAllowed = 'move';
    try { e.dataTransfer.setData('text/plain', String(i)); } catch(_) {}
  };
  const onDragOver = (i) => (e) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    if (hoverIdx !== i) setHoverIdx(i);
  };
  const onDrop = (i) => (e) => {
    e.preventDefault();
    const from = dragIdx.current;
    setHoverIdx(null);
    dragIdx.current = null;
    if (from == null || from === i) return;
    setList(arr => {
      const next = arr.slice();
      const [m] = next.splice(from, 1);
      next.splice(i, 0, m);
      return next;
    });
  };
  const onDragEnd = () => { dragIdx.current = null; setHoverIdx(null); };

  const onChangeNum = (i, raw) => {
    const n = parseInt(String(raw).replace(/[^0-9]/g, '') || '1', 10);
    const ni = Math.max(0, Math.min(list.length - 1, n - 1));
    if (ni === i) return;
    setList(arr => {
      const next = arr.slice();
      const [m] = next.splice(i, 1);
      next.splice(ni, 0, m);
      return next;
    });
  };

  const reset = () => {
    if (regionId) setList(provinces.filter(p => p.region === regionId));
  };

  const handleSave = () => {
    if (regionId && list.length) onSave(regionId, list.map(p => p.id));
    onClose();
  };

  return (
    <div className="fixed inset-0 z-50">
      <div className="absolute inset-0 bg-black/40" onClick={onClose}></div>
      <div className="relative w-full max-w-lg mx-auto mt-16 bg-white rounded-2xl flex flex-col"
        style={{ maxHeight: 'calc(100vh - 8rem)', boxShadow: '0 20px 60px rgba(11,20,48,.30)' }}>
        <header className="px-6 py-4 border-b border-surface-200 flex items-center gap-3 shrink-0">
          <span className="w-10 h-10 rounded-xl flex items-center justify-center shrink-0" style={{ background:'rgba(45,86,210,.10)', color:'#2D56D2' }}>
            <Icon name="bars" size={18} />
          </span>
          <div className="flex-1 min-w-0">
            <div className="text-[15px] font-semibold text-ink-900 leading-tight">เรียงลำดับจังหวัด</div>
            <div className="text-[11.5px] text-ink-700/55">เลือกภาค แล้วลากหรือแก้ไขเลขลำดับเพื่อจัดเรียงจังหวัด</div>
          </div>
          <button onClick={onClose} className="w-8 h-8 rounded-md hover:bg-surface-100 flex items-center justify-center text-ink-700/45"><Icon name="x" size={16} /></button>
        </header>

        <div className="px-6 py-4 border-b border-surface-100 shrink-0">

              {list.map((p, i) => (
                <div key={p.id}
                  draggable
                  onDragStart={onDragStart(i)}
                  onDragOver={onDragOver(i)}
                  onDrop={onDrop(i)}
                  onDragEnd={onDragEnd}
                  className={`grid items-center gap-2 px-3 py-2 border-b border-[#F1F5F9] last:border-b-0 transition-colors ${hoverIdx === i ? 'bg-pb-50' : 'hover:bg-surface-50'}`}
                  style={{ gridTemplateColumns:'88px 1fr', cursor:'grab' }}>
                  <input type="number" min={1} max={list.length}
                    value={i + 1}
                    onChange={e => onChangeNum(i, e.target.value)}
                    onClick={e => e.stopPropagation()}
                    onMouseDown={e => e.stopPropagation()}
                    className="w-16 h-8 px-2 bg-white border border-surface-200 rounded-md text-[13px] font-mono text-center" />
                  <div className="flex items-center gap-2">
                    <svg className="w-4 h-4 text-ink-700/30" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1.8"><path strokeLinecap="round" strokeLinejoin="round" d="M3.75 9h16.5M3.75 15h16.5"/></svg>
                    <span className="text-[13px] font-medium text-ink-900">{p.nameTh}</span>
                    <span className="text-[11px] text-ink-700/50">· {p.nameEn}</span>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>

        <footer className="px-6 py-3 border-t border-surface-200 flex items-center justify-between gap-3 shrink-0">
          <button onClick={reset} disabled={!regionId}
            className="h-9 px-3 rounded-lg border border-surface-300 text-[12.5px] text-ink-700 hover:bg-surface-50 disabled:opacity-40 disabled:cursor-not-allowed inline-flex items-center gap-1.5">
            <Icon name="refresh" size={13} />Reset
          </button>
          <div className="flex gap-2">
            <button onClick={onClose} className="h-9 px-4 rounded-lg border border-surface-300 text-[13px] hover:bg-surface-50">Cancel</button>
            <button onClick={handleSave} disabled={!regionId || !list.length}
              className="h-9 px-5 rounded-lg bg-pb-700 text-white text-[13px] font-medium hover:bg-pb-900 disabled:opacity-50 disabled:cursor-not-allowed">Save Order</button>
          </div>
        </footer>
      </div>
    </div>
  );
}

function StatTile({ icon, label, value, tone='#2D56D2' }) {
  return (
    <div className="bg-white border border-surface-200 rounded-xl px-4 py-3 flex items-center gap-3"
      style={{ boxShadow: '0 1px 3px rgba(11,20,48,.06), 0 1px 2px rgba(11,20,48,.04)' }}>
      <div className="w-9 h-9 rounded-lg flex items-center justify-center shrink-0" style={{ background: `${tone}14`, color: tone }}>
        <Icon name={icon} size={17} />
      </div>
      <div>
        <div className="text-[10px] uppercase font-semibold tracking-wider text-ink-700/55">{label}</div>
        <div className="text-[18px] font-semibold tracking-tight" style={{ fontVariantNumeric: 'tabular-nums' }}>{value}</div>
      </div>
    </div>
  );
}

function MasterDataProvinceScreen() {
  const [provinces, setProvinces] = useState(() => JSON.parse(JSON.stringify(window.PROVINCES_SEED)));
  const [collapsed, setCollapsed] = useState(false);
  const [region, setRegion] = useState('all');
  const [globalSearch, setGlobalSearch] = useState('');
  const [pSearch, setPSearch] = useState('');
  const [dSearch, setDSearch] = useState('');
  const [sSearch, setSSearch] = useState('');
  const [selectedProvinceId, setSelectedProvinceId] = useState('10');
  const [selectedDistrictId, setSelectedDistrictId] = useState('1007');
  const [selectedSubdistrictId, setSelectedSubdistrictId] = useState('100703');
  const [drawerState, setDrawerState] = useState({ open:false, mode:'create', level:'province', initial:null, context:null });
  const [deleteTarget, setDeleteTarget] = useState(null);
  const [aiOpen, setAiOpen] = useState(false);
  const [importOpen, setImportOpen] = useState(false);
  const [sortOpen, setSortOpen] = useState(false);

  const reorderRegion = (regionId, newIds) => {
    setProvinces(prev => {
      const slots = [];
      prev.forEach((p, i) => { if (p.region === regionId) slots.push(i); });
      const byId = Object.fromEntries(prev.map(p => [p.id, p]));
      const next = prev.slice();
      newIds.forEach((id, i) => { if (slots[i] != null && byId[id]) next[slots[i]] = byId[id]; });
      return next;
    });
  };

  const filteredProvinces = useMemo(() => {
    return provinces.filter(p => {
      if (region !== 'all' && p.region !== region) return false;
      if (pSearch && !(p.nameTh.includes(pSearch) || (p.nameEn||'').toLowerCase().includes(pSearch.toLowerCase()))) return false;
      if (globalSearch) {
        const q = globalSearch.toLowerCase();
        const hits = p.nameTh.includes(globalSearch) || (p.nameEn||'').toLowerCase().includes(q) ||
          p.districts.some(d => d.nameTh.includes(globalSearch) || (d.nameEn||'').toLowerCase().includes(q) ||
            d.subdistricts.some(s => s.nameTh.includes(globalSearch) || (s.nameEn||'').toLowerCase().includes(q) || (s.postal||'').includes(globalSearch)));
        if (!hits) return false;
      }
      return true;
    });
  }, [provinces, region, pSearch, globalSearch]);

  const selectedProvince = filteredProvinces.find(p => p.id === selectedProvinceId) || filteredProvinces[0];
  const districts = selectedProvince ? selectedProvince.districts : [];
  const filteredDistricts = useMemo(() => {
    if (!dSearch) return districts;
    return districts.filter(d => d.nameTh.includes(dSearch) || (d.nameEn||'').toLowerCase().includes(dSearch.toLowerCase()));
  }, [districts, dSearch]);
  const selectedDistrict = filteredDistricts.find(d => d.id === selectedDistrictId) || filteredDistricts[0];
  const subdistricts = selectedDistrict ? selectedDistrict.subdistricts : [];
  const filteredSubdistricts = useMemo(() => {
    if (!sSearch) return subdistricts;
    return subdistricts.filter(s => s.nameTh.includes(sSearch) || (s.nameEn||'').toLowerCase().includes(sSearch.toLowerCase()) || (s.postal||'').includes(sSearch));
  }, [subdistricts, sSearch]);
  const selectedSubdistrict = filteredSubdistricts.find(s => s.id === selectedSubdistrictId) || filteredSubdistricts[0];

  const stats = useMemo(() => window.aggregateCounts(provinces), [provinces]);
  const regionCounts = useMemo(() => {
    const m = {}; window.REGIONS.forEach(r => m[r.id] = 0);
    provinces.forEach(p => { m[p.region] = (m[p.region] || 0) + 1; });
    return m;
  }, [provinces]);

  const openCreate = (level, ctx) => setDrawerState({ open:true, mode:'create', level, initial:null, context: ctx });
  const openEdit = (level, item, ctx) => setDrawerState({ open:true, mode:'edit', level, initial: { ...item }, context: ctx });
  const closeDrawer = () => setDrawerState(s => ({ ...s, open:false }));

  const saveEntity = (data) => {
    const { level, mode, initial } = drawerState;
    setProvinces(prev => {
      const next = prev.map(p => ({ ...p, districts: p.districts.map(d => ({ ...d, subdistricts: d.subdistricts.map(s => ({ ...s })) })) }));
      if (level === 'province') {
        if (mode === 'create') {
          const newP = { id: uid('p'), region: data.region, nameTh: data.nameTh, nameEn: data.nameEn || '', code: data.code || '', districts: [] };
          next.push(newP); setSelectedProvinceId(newP.id);
        } else {
          const p = next.find(p => p.id === initial.id);
          if (p) { p.region = data.region; p.nameTh = data.nameTh; p.nameEn = data.nameEn; p.code = data.code; }
        }
      }
      if (level === 'district') {
        const parent = next.find(p => p.id === drawerState.context.provinceId);
        if (mode === 'create') {
          const newD = { id: uid('d'), nameTh: data.nameTh, nameEn: data.nameEn || '', subdistricts: [] };
          parent.districts.push(newD); setSelectedDistrictId(newD.id);
        } else {
          const d = parent.districts.find(d => d.id === initial.id);
          if (d) { d.nameTh = data.nameTh; d.nameEn = data.nameEn; }
        }
      }
      if (level === 'subdistrict') {
        const parentP = next.find(p => p.id === drawerState.context.provinceId);
        const parentD = parentP.districts.find(d => d.id === drawerState.context.districtId);
        if (mode === 'create') {
          const newS = { id: uid('s'), nameTh: data.nameTh, nameEn: data.nameEn || '', postal: data.postal };
          parentD.subdistricts.push(newS); setSelectedSubdistrictId(newS.id);
        } else {
          const s = parentD.subdistricts.find(s => s.id === initial.id);
          if (s) { s.nameTh = data.nameTh; s.nameEn = data.nameEn; s.postal = data.postal; }
        }
      }
      return next;
    });
    closeDrawer();
  };

  const confirmDelete = () => {
    const t = deleteTarget; if (!t) return;
    setProvinces(prev => {
      const next = prev.map(p => ({ ...p, districts: p.districts.map(d => ({ ...d, subdistricts: [...d.subdistricts] })) }));
      if (t.level === 'province') { const idx = next.findIndex(p => p.id === t.id); if (idx > -1) next.splice(idx, 1); setSelectedProvinceId(next[0]?.id); }
      if (t.level === 'district') { const p = next.find(p => p.id === t.parentPId); const idx = p.districts.findIndex(d => d.id === t.id); if (idx > -1) p.districts.splice(idx, 1); setSelectedDistrictId(p.districts[0]?.id); }
      if (t.level === 'subdistrict') { const p = next.find(p => p.id === t.parentPId); const d = p.districts.find(d => d.id === t.parentDId); const idx = d.subdistricts.findIndex(s => s.id === t.id); if (idx > -1) d.subdistricts.splice(idx, 1); setSelectedSubdistrictId(d.subdistricts[0]?.id); }
      return next;
    });
    setDeleteTarget(null);
  };

  const leftPad = collapsed ? 68 : 256;

  return (
    <div className="min-h-screen flex bg-[#F7F9FC]" style={{ color: '#0B1430' }}>
      <main className="flex-1 min-h-screen flex flex-col transition-[margin-left] duration-200 lg:ml-64">
        <Topbar crumbs={[
            { label:'Home',        href:'dashboard.html' },
            { label:'Setting',     href:'settings-master.html' },
            { label:'Master Data', href:'settings-master.html' },
            'ข้อมูลจังหวัด'
          ]}
          onToggleSidebar={() => window.collapseSidebar()}
          onToggleAi={() => setAiOpen(o => !o)} aiOpen={aiOpen} />

        <div className="flex-1 p-4 sm:p-6">
          <div className="max-w-[1600px] mx-auto space-y-4 flex flex-col" style={{ minHeight: 'calc(100vh - 96px)' }}>
            <div className="flex items-start justify-between gap-3 flex-wrap">
              <div>
                <h2 className="text-[22px] font-semibold text-ink-900 tracking-tight">ข้อมูลจังหวัด · Master Data</h2>
                <p className="text-[12px] text-ink-700/55 mt-0.5">
                  จัดการข้อมูลที่อยู่ตามมาตรฐานไทย: ภาค → จังหวัด → เขต/อำเภอ → ตำบล/แขวง พร้อมรหัสไปรษณีย์
                </p>
              </div>
              <div className="flex gap-2">
                <Button variant="secondary" icon="bars" onClick={() => setSortOpen(true)}>เรียงลำดับจังหวัด</Button>
                <Button variant="ghost" icon="upload">ส่งออก</Button>
                <Button variant="primary" icon="plus" onClick={() => openCreate('province', null)}>เพิ่มจังหวัด</Button>
              </div>
            </div>

            <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
              <StatTile icon="chart-bar" label="ภาค" value={window.REGIONS.length} tone="#2D56D2" />
              <StatTile icon="archive-box" label="จังหวัด" value={stats.provinces} tone="#4790FF" />
              <StatTile icon="clipboard" label="เขต / อำเภอ" value={stats.districts} tone="#06B6D4" />
              <StatTile icon="banknotes" label="ตำบล / แขวง" value={stats.subdistricts} tone="#10B981" />
            </div>

            <div className="bg-white border border-surface-200 rounded-xl p-3"
              style={{ boxShadow: '0 1px 3px rgba(11,20,48,.06), 0 1px 2px rgba(11,20,48,.04)' }}>
              <div className="flex items-center gap-2 flex-wrap">
                <div className="relative flex-1 min-w-[220px]">
                  <Icon name="search" size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-ink-700/35" />
                  <input value={globalSearch} onChange={e => setGlobalSearch(e.target.value)}
                    placeholder="ค้นหาทุกระดับ — ชื่อจังหวัด/อำเภอ/ตำบล/รหัสไปรษณีย์..."
                    className="w-full h-9 pl-9 pr-3 bg-surface-50 border border-surface-200 rounded-lg text-[13px]" />
                </div>
                <div className="flex items-center gap-1.5 flex-wrap">
                  <button onClick={() => setRegion('all')}
                    className={`h-8 px-3 rounded-full text-[12px] font-medium border transition-colors ${region === 'all' ? 'bg-pb-700 text-white border-pb-700' : 'bg-white text-ink-700/70 border-surface-200 hover:bg-pb-50 hover:border-pb-100'}`}>
                    ทั้งหมด · {provinces.length}
                  </button>
                  {window.REGIONS.map(r => (
                    <button key={r.id} onClick={() => setRegion(r.id)}
                      className={`h-8 px-3 rounded-full text-[12px] font-medium border transition-colors ${region === r.id ? 'bg-pb-700 text-white border-pb-700' : 'bg-white text-ink-700/70 border-surface-200 hover:bg-pb-50 hover:border-pb-100'}`}>
                      {r.nameTh} · {regionCounts[r.id]}
                    </button>
                  ))}
                </div>
              </div>
            </div>

            <div className="grid gap-3 flex-1" style={{ gridTemplateColumns: 'minmax(220px, 1fr) minmax(220px, 1fr) minmax(220px, 1fr) minmax(280px, 1.3fr)', minHeight: 480 }}>
              <Pane title="จังหวัด" count={filteredProvinces.length}
                subtitle={region === 'all' ? 'ทั้งหมด' : regionOf(region).nameTh}
                onAdd={() => openCreate('province', null)}
                search={pSearch} onSearch={setPSearch} empty="ไม่พบจังหวัดในเงื่อนไขที่เลือก">
                {filteredProvinces.map(p => (
                  <PaneRow key={p.id} item={p} meta={p.districts.length} secondary={`${regionOf(p.region).nameTh} · ${p.nameEn}`}
                    active={selectedProvince?.id === p.id}
                    onSelect={() => { setSelectedProvinceId(p.id); setSelectedDistrictId(null); setSelectedSubdistrictId(null); }}
                    onEdit={() => openEdit('province', p, { regionLabel: regionOf(p.region).nameTh })}
                    onDelete={() => setDeleteTarget({ level:'province', id:p.id, label: `จังหวัด ${p.nameTh}`,
                      warning: p.districts.length > 0 ? `จะลบ ${p.districts.length} เขต และตำบลทั้งหมดด้วย` : null })} />
                ))}
              </Pane>

              <Pane title="เขต / อำเภอ" count={filteredDistricts.length}
                subtitle={selectedProvince ? `ในจังหวัด${selectedProvince.nameTh}` : 'เลือกจังหวัดก่อน'}
                onAdd={() => selectedProvince && openCreate('district', {
                  provinceId: selectedProvince.id, regionLabel: regionOf(selectedProvince.region).nameTh,
                  provinceLabel: selectedProvince.nameTh, region: selectedProvince.region,
                })}
                search={dSearch} onSearch={setDSearch}
                empty={selectedProvince ? 'ไม่มีเขต/อำเภอ — กด "เพิ่ม"' : 'เลือกจังหวัดก่อน'}>
                {filteredDistricts.map(d => (
                  <PaneRow key={d.id} item={d} meta={d.subdistricts.length} secondary={d.nameEn}
                    active={selectedDistrict?.id === d.id}
                    onSelect={() => { setSelectedDistrictId(d.id); setSelectedSubdistrictId(null); }}
                    onEdit={() => openEdit('district', d, { provinceId: selectedProvince.id, regionLabel: regionOf(selectedProvince.region).nameTh, provinceLabel: selectedProvince.nameTh })}
                    onDelete={() => setDeleteTarget({ level:'district', id:d.id, parentPId: selectedProvince.id, label: `เขต ${d.nameTh}`,
                      warning: d.subdistricts.length > 0 ? `จะลบ ${d.subdistricts.length} ตำบล/แขวง ด้วย` : null })} />
                ))}
              </Pane>

              <Pane title="ตำบล / แขวง" count={filteredSubdistricts.length}
                subtitle={selectedDistrict ? `ใน ${selectedDistrict.nameTh}` : 'เลือกเขต/อำเภอก่อน'}
                onAdd={() => selectedDistrict && openCreate('subdistrict', {
                  provinceId: selectedProvince.id, districtId: selectedDistrict.id,
                  regionLabel: regionOf(selectedProvince.region).nameTh,
                  provinceLabel: selectedProvince.nameTh, districtLabel: selectedDistrict.nameTh, region: selectedProvince.region,
                })}
                search={sSearch} onSearch={setSSearch}
                empty={selectedDistrict ? 'ไม่มีตำบล/แขวง — กด "เพิ่ม"' : 'เลือกเขต/อำเภอก่อน'}>
                {filteredSubdistricts.map(s => (
                  <PaneRow key={s.id} item={s} meta={s.postal} secondary={s.nameEn}
                    active={selectedSubdistrict?.id === s.id}
                    onSelect={() => setSelectedSubdistrictId(s.id)}
                    onEdit={() => openEdit('subdistrict', s, { provinceId: selectedProvince.id, districtId: selectedDistrict.id, regionLabel: regionOf(selectedProvince.region).nameTh, provinceLabel: selectedProvince.nameTh, districtLabel: selectedDistrict.nameTh })}
                    onDelete={() => setDeleteTarget({ level:'subdistrict', id:s.id, parentPId: selectedProvince.id, parentDId: selectedDistrict.id, label: `ตำบล ${s.nameTh} (${s.postal})` })} />
                ))}
              </Pane>

              <DetailCard region={selectedProvince ? regionOf(selectedProvince.region) : null}
                province={selectedProvince} district={selectedDistrict} subdistrict={selectedSubdistrict}
                onEdit={() => selectedSubdistrict && openEdit('subdistrict', selectedSubdistrict, { provinceId: selectedProvince.id, districtId: selectedDistrict.id, regionLabel: regionOf(selectedProvince.region).nameTh, provinceLabel: selectedProvince.nameTh, districtLabel: selectedDistrict.nameTh })}
                onDelete={() => selectedSubdistrict && setDeleteTarget({ level:'subdistrict', id:selectedSubdistrict.id, parentPId: selectedProvince.id, parentDId: selectedDistrict.id, label: `ตำบล ${selectedSubdistrict.nameTh} (${selectedSubdistrict.postal})` })} />
            </div>
          </div>
        </div>
      </main>

      <EntityDrawer open={drawerState.open} mode={drawerState.mode} level={drawerState.level}
        initial={drawerState.initial} context={drawerState.context} onClose={closeDrawer} onSave={saveEntity} />
      <ConfirmDelete open={!!deleteTarget} target={deleteTarget}
        onClose={() => setDeleteTarget(null)} onConfirm={confirmDelete} />
      <ImportCsvModal open={importOpen} onClose={() => setImportOpen(false)} />
      <ProvinceSortModal open={sortOpen} onClose={() => setSortOpen(false)}
        provinces={provinces} regions={window.REGIONS} onSave={reorderRegion} />
      <AiPanel open={aiOpen} onClose={() => setAiOpen(false)} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<MasterDataProvinceScreen />);
</script>
</body>
</html>
