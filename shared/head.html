<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config={theme:{extend:{fontFamily:{kanit:['Kanit','sans-serif']},colors:{pb:{900:'#213268',700:'#2D56D2',500:'#4790FF',300:'#5FCBF9',50:'#EBF5FF',100:'#D6ECFF'},ink:{900:'#0B1430',800:'#162040',700:'#1E293B'},surface:{0:'#FFFFFF',50:'#F8FAFC',100:'#F1F5F9',200:'#E2E8F0',300:'#CBD5E1'}}}}}
</script>
<style>
*{font-family:'Kanit',sans-serif;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#CBD5E8;border-radius:10px;border:2px solid #F7F9FC}
::-webkit-scrollbar-thumb:hover{background:#93A4C4}
.sidebar-scroll::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.06);border:2px solid transparent}
.sidebar-scroll::-webkit-scrollbar-track{background:transparent}
/* Sidebar nav items — White theme */
.sidebar-nav{color:rgba(30,41,59,0.6);transition:all 0.15s;position:relative;font-size:13px}
.sidebar-nav:hover{color:#0B1430;background:rgba(71,144,255,0.06)}
.sidebar-nav.active{color:#2D56D2;font-weight:500;background:linear-gradient(90deg,rgba(71,144,255,0.10),rgba(71,144,255,0))}
.sidebar-nav.active::before{content:'';position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:2px;background:#2D56D2}
/* Sidebar group headers */
.sidebar-nav-parent{color:rgba(30,41,59,0.4);transition:all 0.15s;font-size:10.5px;text-transform:uppercase;letter-spacing:0.05em;font-weight:600}
.sidebar-nav-parent:hover{color:rgba(30,41,59,0.7)}
.sidebar-nav-parent.active{color:rgba(30,41,59,0.7)}
/* Sidebar sub-items */
.sidebar-sub{color:rgba(30,41,59,0.55);transition:all 0.15s;position:relative}
.sidebar-sub:hover{color:#0B1430;background:rgba(71,144,255,0.06)}
.sidebar-sub.active{color:#2D56D2;font-weight:500;background:linear-gradient(90deg,rgba(71,144,255,0.10),rgba(71,144,255,0))}
.sidebar-sub.active::before{content:'';position:absolute;left:0;top:6px;bottom:6px;width:3px;border-radius:2px;background:#2D56D2}
/* nav-item for page content compatibility */
.nav-item{transition:all 0.2s;border-radius:8px}
.nav-item:hover,.nav-item.active{background:rgba(71,144,255,0.12);color:#4790FF}
.nav-parent.active{color:#2D56D2;font-weight:500}
/* Cards & general UI */
.card-hover{transition:all 0.2s}
.card-hover:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(33,50,104,0.12)}
.badge-pulse{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.7}}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
input:focus,select:focus,textarea:focus{outline:none;border-color:#4790FF;box-shadow:0 0 0 3px rgba(71,144,255,0.15)}
.tab-btn{transition:all 0.2s}
.tab-btn.active{color:#2D56D2;border-bottom:2px solid #2D56D2}
table th{position:sticky;top:0;z-index:1}
.progress-bar{transition:width 0.6s ease}
/* Topbar — White glass */
.topbar-white{background:rgba(255,255,255,0.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid #E2E8F0}
/* Dashboard extras */
.tnum{font-variant-numeric:tabular-nums}
.shine{background:linear-gradient(135deg,#2D56D2,#5FCBF9)}
.shine-soft{background:linear-gradient(135deg,rgba(71,144,255,0.08),rgba(95,203,249,0.08))}
.ai-border{box-shadow:0 0 0 1px rgba(45,86,210,0.25),0 2px 8px rgba(45,86,210,0.08)}
.pulse-dot{animation:pulseDot 2s ease-in-out infinite}
@keyframes pulseDot{0%,100%{transform:scale(1);opacity:.4}50%{transform:scale(1.5);opacity:0}}
.map-bg{background:linear-gradient(135deg,#F8FAFC 0%,#EBF5FF 100%)}
.shadow-pop{box-shadow:0 8px 30px rgba(11,20,48,0.12)}
.shadow-card{box-shadow:0 1px 3px rgba(11,20,48,0.06),0 1px 2px rgba(11,20,48,0.04)}
/* Sidebar collapse label */
.sidebar-label{transition:opacity 0.15s;white-space:nowrap;overflow:hidden}
</style>
