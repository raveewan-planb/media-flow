<script>
/* === Expand/collapse sub-menus === */
function toggleMenu(id){
  const sub=document.getElementById(id+'-sub');
  const chevron=document.getElementById(id+'-chevron');
  if(sub.classList.contains('hidden')){
    sub.classList.remove('hidden');
    chevron.classList.add('rotate-90');
  }else{
    sub.classList.add('hidden');
    chevron.classList.remove('rotate-90');
  }
}

/* === Mobile sidebar overlay === */
function toggleMobile(){
  const sidebar=document.getElementById('sidebar');
  const overlay=document.getElementById('sidebar-overlay');
  sidebar.classList.toggle('-translate-x-full');
  overlay.classList.toggle('hidden');
}

/* === Desktop collapse sidebar === */
let _sidebarCollapsed = false;
function collapseSidebar(){
  // On mobile, toggle mobile drawer instead
  if(window.innerWidth < 1024){
    toggleMobile();
    return;
  }
  _sidebarCollapsed = !_sidebarCollapsed;
  const sb = document.getElementById('sidebar');
  const main = document.querySelector('main');
  const labels = sb.querySelectorAll('.sidebar-label');
  const groups = sb.querySelectorAll('.sidebar-nav-parent');
  const subs = sb.querySelectorAll('[id$="-sub"]');
  const brand = document.getElementById('sidebar-brand');

  if(_sidebarCollapsed){
    sb.classList.remove('w-64');
    sb.classList.add('w-[68px]');
    main.classList.remove('lg:ml-64');
    main.classList.add('lg:ml-[68px]');
    labels.forEach(el=>el.classList.add('hidden'));
    groups.forEach(el=>el.classList.add('hidden'));
    subs.forEach(el=>el.classList.add('hidden'));
    if(brand) brand.classList.replace('px-4','px-0');
    if(brand) brand.classList.add('justify-center');
  } else {
    sb.classList.remove('w-[68px]');
    sb.classList.add('w-64');
    main.classList.remove('lg:ml-[68px]');
    main.classList.add('lg:ml-64');
    labels.forEach(el=>el.classList.remove('hidden'));
    groups.forEach(el=>el.classList.remove('hidden'));
    // Re-show sub-menus that were explicitly open (have active items)
    subs.forEach(el=>{
      if(el.querySelector('.active')) el.classList.remove('hidden');
    });
    if(brand) brand.classList.replace('px-0','px-4');
    if(brand) brand.classList.remove('justify-center');
  }
}

/* === AI Panel === */
let _aiOpen = false;
function toggleAI(){
  _aiOpen = !_aiOpen;
  const panel = document.getElementById('ai-panel');
  const btn = document.getElementById('ai-toggle');
  if(_aiOpen){
    panel.classList.remove('translate-x-full');
    btn.classList.remove('bg-white','border-surface-300','text-ink-900','hover:bg-surface-50');
    btn.classList.add('bg-ink-900','text-white','border-ink-900');
  } else {
    panel.classList.add('translate-x-full');
    btn.classList.remove('bg-ink-900','text-white','border-ink-900');
    btn.classList.add('bg-white','border-surface-300','text-ink-900','hover:bg-surface-50');
  }
}

/* AI demo chat */
const _aiReplies = [
  "Based on current data, BTS corridor occupancy is trending at 84% — above the 78% network average. If the pattern holds, May could hit 89% with AIS and TrueMove briefs both targeting Silom.",
  "This week we have 3 open claims: #1284 (high — LED flicker, 2h remaining SLA), #1282 (critical — content not playing, urgent), and #1283 (med — vinyl peel, within SLA). The critical item needs immediate attention.",
  "Your top 3 clients YTD: AIS Thailand (฿24.8M, 18 campaigns), TrueMove H (฿18.5M, 14 campaigns), and Toyota Motor (฿15.2M, 9 campaigns). Toyota is underspending on digital LED — they only use 2 of your 5 available LED sites.",
  "Draft proposal ready: AIS 30-day coverage across 8 Bangkok sites (including Silom LED, Rama IX, Asoke) + 2 Chiang Mai sites. Estimated package: ฿4.2M. Occupancy conflicts on TH-SIL-09 for May 5-12 — recommend offering X-CAYA-FY-1 as substitute.",
];
let _aiReplyIdx = 0;

function aiSend(text){
  const input = document.getElementById('ai-input');
  const msg = text || input.value.trim();
  if(!msg) return;
  input.value = '';
  document.getElementById('ai-suggestions').style.display='none';

  const box = document.getElementById('ai-messages');
  // User bubble
  box.innerHTML += '<div class="text-right"><div class="inline-block max-w-[90%] text-[13px] leading-relaxed rounded-xl px-3.5 py-2.5 bg-ink-900 text-white">'+msg.replace(/</g,'&lt;')+'</div></div>';
  box.scrollTop = box.scrollHeight;

  // Thinking dots
  const thinkId = 'ai-think-'+Date.now();
  box.innerHTML += '<div id="'+thinkId+'" class="flex items-center gap-2 text-[12px]" style="color:rgba(30,41,59,0.6)"><div class="flex gap-1"><span class="w-1.5 h-1.5 bg-pb-500 rounded-full pulse-dot"></span><span class="w-1.5 h-1.5 bg-pb-500 rounded-full pulse-dot" style="animation-delay:.2s"></span><span class="w-1.5 h-1.5 bg-pb-500 rounded-full pulse-dot" style="animation-delay:.4s"></span></div>analyzing CRM data…</div>';
  box.scrollTop = box.scrollHeight;

  setTimeout(()=>{
    const el = document.getElementById(thinkId);
    if(el) el.remove();
    const reply = _aiReplies[_aiReplyIdx % _aiReplies.length];
    _aiReplyIdx++;
    box.innerHTML += '<div><div class="text-[10px] font-medium uppercase tracking-wide mb-1" style="color:rgba(30,41,59,0.5)">Copilot</div><div class="inline-block max-w-[90%] text-[13px] leading-relaxed rounded-xl px-3.5 py-2.5 bg-surface-50 border border-surface-200">'+reply+'</div></div>';
    box.scrollTop = box.scrollHeight;
  }, 1500);
}
</script>
