<style>
*{font-family:'Kanit',sans-serif;-webkit-font-smoothing:antialiased}
html,body{overflow-x:hidden}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#CBD5E8;border-radius:10px;border:2px solid #F7F9FC}
::-webkit-scrollbar-thumb:hover{background:#93A4C4}
input:focus,select:focus{outline:none;border-color:#4790FF;box-shadow:0 0 0 3px rgba(71,144,255,0.15)}
.topbar-white{background:rgba(255,255,255,0.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid #E2E8F0}
.tnum{font-variant-numeric:tabular-nums}

/* Hero / search bar */
.fav-hero{background:linear-gradient(135deg,#F1F6FF 0%,#FFFFFF 60%,#FFF7E6 100%);border-radius:16px;padding:18px;border:1px solid #E2E8F0}

/* Module card */
.mod-card{position:relative;background:#fff;border:1px solid #E2E8F0;border-radius:16px;padding:18px 18px 22px;transition:all .18s ease;cursor:pointer;overflow:hidden;animation:fadeUp .25s ease backwards}
.mod-card::after{content:'';position:absolute;left:14px;right:14px;bottom:8px;height:3px;border-radius:99px;background:var(--mod-color,#2D56D2);opacity:.85}
.mod-card:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(11,20,48,0.08),0 2px 6px rgba(11,20,48,0.04);border-color:var(--mod-color-soft,#CBD5E1)}
.mod-card .mod-icon{width:44px;height:44px;border-radius:12px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--mod-bg,#EBF5FF);color:var(--mod-color,#2D56D2)}
.mod-card .mod-title{font-size:15.5px;font-weight:700;color:#0B1430;line-height:1.2}
.mod-card .mod-badge{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:99px;background:rgba(16,185,129,0.12);color:#047857;letter-spacing:.02em;margin-top:4px}
.mod-card .mod-badge::before{content:'';width:5px;height:5px;border-radius:50%;background:#10B981}
.mod-card .mod-desc{font-size:12.5px;color:rgba(30,41,59,0.65);line-height:1.45;margin-top:10px}
.mod-card .mod-link{position:absolute;inset:0;border-radius:16px;z-index:1}
/* Star button — sits ABOVE the full-card link */
.mod-star{position:absolute;top:12px;right:12px;width:34px;height:34px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;background:#F8FAFC;border:1px solid #E2E8F0;color:rgba(30,41,59,0.4);cursor:pointer;transition:all .15s;z-index:2}
.mod-star:hover{background:#FEF3C7;border-color:#FCD34D;color:#D97706;transform:scale(1.05)}
.mod-star.on{background:#FEF3C7;border-color:#FCD34D;color:#D97706}
.mod-star.on svg{fill:#F59E0B;stroke:#D97706}
.mod-star svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}

/* Search field */
.fld-search{position:relative}
.fld-search input{width:100%;height:44px;padding:0 14px 0 42px;background:#fff;border:1px solid #E2E8F0;border-radius:12px;font-size:13px;color:#0B1430;transition:all .15s;font-family:'Kanit',sans-serif}
.fld-search input::placeholder{color:rgba(30,41,59,0.4)}
.fld-search input:focus{border-color:#4790FF;box-shadow:0 0 0 3px rgba(71,144,255,0.15)}
.fld-search .ic{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:rgba(30,41,59,0.5)}

/* Tool buttons */
.tool-btn{height:44px;padding:0 14px;background:#fff;border:1px solid #E2E8F0;border-radius:12px;font-size:12.5px;font-weight:500;color:#0B1430;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s;white-space:nowrap}
.tool-btn:hover{background:#F8FAFC;border-color:#CBD5E1}
.tool-btn.active{background:#FEF3C7;border-color:#FCD34D;color:#92400E}
.tool-btn.active svg{fill:#F59E0B;stroke:#D97706}
.tool-btn .pill{font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace;padding:2px 8px;border-radius:99px;background:#F1F5F9;color:rgba(30,41,59,0.65);font-variant-numeric:tabular-nums}

/* Section title */
.feature-title{display:flex;align-items:center;gap:10px;margin:18px 2px 16px}
.feature-title .ti-ic{width:34px;height:34px;border-radius:10px;background:#EBF5FF;color:#2D56D2;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.feature-title h2{font-size:20px;font-weight:700;color:#0B1430;line-height:1.1}
.feature-title .ti-tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;background:#EBF5FF;color:#2D56D2;padding:3px 10px;border-radius:99px;letter-spacing:.02em}
.feature-title .ti-tag svg{width:11px;height:11px;fill:currentColor}

/* Group header */
.group-hd{font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:rgba(30,41,59,0.55);margin:28px 2px 12px;display:flex;align-items:center;gap:8px}
.group-hd::before{content:'';width:3px;height:14px;border-radius:99px;background:#4790FF;opacity:.6}

/* Empty state */
.empty-state{text-align:center;padding:60px 20px;background:#fff;border:1px dashed #CBD5E1;border-radius:16px}
.empty-state svg{width:48px;height:48px;color:rgba(30,41,59,0.3);margin:0 auto 12px;display:block}
.empty-state h3{font-size:14.5px;font-weight:600;color:#0B1430;margin-bottom:4px}
.empty-state p{font-size:12.5px;color:rgba(30,41,59,0.55)}

/* Fade animation */
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.mod-card:nth-child(1){animation-delay:.02s}.mod-card:nth-child(2){animation-delay:.04s}
.mod-card:nth-child(3){animation-delay:.06s}.mod-card:nth-child(4){animation-delay:.08s}
.mod-card:nth-child(5){animation-delay:.10s}.mod-card:nth-child(6){animation-delay:.12s}
.mod-card:nth-child(7){animation-delay:.14s}.mod-card:nth-child(8){animation-delay:.16s}
.mod-card:nth-child(9){animation-delay:.18s}.mod-card:nth-child(10){animation-delay:.20s}
.mod-card:nth-child(11){animation-delay:.22s}.mod-card:nth-child(12){animation-delay:.24s}

/* Toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0B1430;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;z-index:100;box-shadow:0 10px 30px rgba(11,20,48,0.3);display:none}
#toast.show{display:block;animation:fadeUp .2s ease}
</style>

    </div>
  </main>

const STORAGE_KEY = 'pb-favorites';

function loadFavs(){
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch(e){ return []; }
}
function saveFavs(arr){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
}
function isFav(key){ return loadFavs().indexOf(key) !== -1; }
function toggleFav(key){
  const favs = loadFavs();
  const i = favs.indexOf(key);
  if(i === -1){ favs.push(key); saveFavs(favs); return true; }
  favs.splice(i, 1); saveFavs(favs); return false;
}

let showFavOnly = false;

function toggleFavOnly(){
  showFavOnly = !showFavOnly;
  const btn = document.getElementById('fav-toggle');
  const label = document.getElementById('fav-toggle-label');
  if(showFavOnly){
    btn.classList.add('active');
    label.textContent = 'Show All';
  } else {
    btn.classList.remove('active');
    label.textContent = 'Show Favorites';
  }
  renderModules();
}

function moduleCardHTML(m){
  const fav = isFav(m.key);
  return `
    <div class="mod-card" style="--mod-color:${m.color};--mod-color-soft:${m.color}40;--mod-bg:${m.bg}">
      <a href="${m.href}" class="mod-link" aria-label="ไปที่ ${m.title}"></a>
      <button type="button" class="mod-star ${fav ? 'on' : ''}" onclick="event.stopPropagation();onStarClick(event, '${m.key}')" aria-label="ทำเครื่องหมายเป็นรายการโปรด">
        <svg viewBox="0 0 24 24"><path d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.563.563 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.563.563 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z"/></svg>
      </button>
      <div class="flex items-start gap-3">
        <span class="mod-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">${m.icon}</svg>
        </span>
        <div class="flex-1 min-w-0 pr-8">
          <div class="mod-title">${m.title}</div>
          <div class="mod-badge">Available</div>
        </div>
      </div>
      <div class="mod-desc">${m.desc}</div>
    </div>`;
}

function renderModules(){
  const root = document.getElementById('modules-root');
  const q = (document.getElementById('search-input').value || '').toLowerCase().trim();
  const favs = loadFavs();

  let list = MODULES.slice();
  // Filter
  if(showFavOnly){
    list = list.filter(m => favs.indexOf(m.key) !== -1);
  }
  if(q){
    list = list.filter(m =>
      m.title.toLowerCase().includes(q) ||
      m.desc.toLowerCase().includes(q) ||
      m.group.toLowerCase().includes(q)
    );
  }
  // Sort alphabetically by title within group
  list.sort((a,b)=>a.title.localeCompare(b.title,'en'));

  // Update counts
  document.getElementById('count-results').textContent = list.length + ' results';
  document.getElementById('count-modules').textContent = list.length + ' modules';

  if(list.length === 0){
    root.innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.563.563 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.563.563 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z"/></svg>
        <h3>${showFavOnly ? 'ยังไม่มีรายการโปรด' : 'ไม่พบโมดูลที่ตรงกับคำค้น'}</h3>
        <p>${showFavOnly ? 'กดรูปดาวที่มุมขวาบนของการ์ดเพื่อเพิ่มเข้ารายการโปรด' : 'ลองพิมพ์คำค้นใหม่ หรือกด Show All เพื่อดูทุกโมดูล'}</p>
      </div>`;
    return;
  }

  // Group by category — but when searching/fav-only, show flat
  if(q || showFavOnly){
    root.innerHTML = `<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">${list.map(moduleCardHTML).join('')}</div>`;
    return;
  }

  // Default view: grouped sections
  const groups = ['Core','Media Approval','Operations','Report','Setting'];
  const html = groups.map(g => {
    const items = list.filter(m => m.group === g);
    if(items.length === 0) return '';
    return `
      <div class="group-hd">${g} <span class="text-[10.5px] font-mono px-2 py-0.5 rounded-md tnum ml-2" style="background:#F1F5F9;color:rgba(30,41,59,0.55)">${items.length}</span></div>
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">${items.map(moduleCardHTML).join('')}</div>`;
  }).join('');
  root.innerHTML = html;
}

function onStarClick(ev, key){
  ev.preventDefault();
  ev.stopPropagation();
  const nowOn = toggleFav(key);
  const m = MODULES.find(x => x.key === key);
  toast(nowOn ? '★ เพิ่ม "' + (m?.title || key) + '" เข้ารายการโปรดแล้ว' : '✕ ลบ "' + (m?.title || key) + '" ออกจากรายการโปรด');
  renderModules();
}

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._tm);
  toast._tm = setTimeout(()=>t.classList.remove('show'), 2200);
}

// Initial render
renderModules();
</script>
