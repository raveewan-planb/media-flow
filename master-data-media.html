function mediaStatus(id) { return MEDIA_STATUSES.find(s => s.id === id); }
function aggregateMedia(groups) {
  let types = 0, active = 0;
  groups.forEach(g => {
    types += g.types.length;
    g.types.forEach(t => { if (t.status === undefined || t.status === 'active') active++; });
  });
  return { groups: groups.length, types, active, inactive: types - active };
}

<script type="text/babel" data-presets="react">
const { useState, useMemo, useRef, useEffect } = React;

function MediaStatusBadge({ id }) {
  const s = window.mediaStatus(id);
  if (!s) return null;
  return (
    <span className="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full font-medium border text-[11px]"
      style={{ background: s.bg, color: s.text, borderColor: s.border }}>
      <span className="w-1.5 h-1.5 rounded-full" style={{ background: s.color }} />
      {s.label}
    </span>
  );
}

function PaneRow({ item, dot, meta, secondary, active, onSelect, onEdit, onDelete }) {
  return (
    <div onClick={onSelect}
      className={`row-hover group cursor-pointer flex items-center gap-2 px-3 py-2 rounded-md text-[13px] transition-colors ${active ? 'row-active' : 'text-ink-700 hover:bg-[#4790FF]/[0.06] hover:text-ink-900'}`}>
      {dot && <span className="w-1.5 h-1.5 rounded-full shrink-0" style={{ background: dot }} />}
      <div className="flex-1 min-w-0">
        <div className="truncate">{item.nameTh}</div>
        {secondary && <div className="text-[11px] text-ink-700/50 truncate">{secondary}</div>}
      </div>
      {meta !== undefined && <span className="shrink-0 text-[10.5px] font-mono text-ink-700/45 mr-1">{meta}</span>}
      <div className="flex items-center gap-1 shrink-0">
        <button onClick={e => { e.stopPropagation(); onEdit(); }} title="Edit"
          className="w-7 h-7 rounded-md flex items-center justify-center bg-pb-50/60 text-pb-700 hover:bg-pb-100 hover:text-pb-900 transition-colors">
          <Icon name="pencil" size={13} />
        </button>
        <button onClick={e => { e.stopPropagation(); onDelete(); }} title="Delete"
          className="w-7 h-7 rounded-md flex items-center justify-center bg-rose-50/60 text-rose-600 hover:bg-rose-100 hover:text-rose-700 transition-colors">
          <Icon name="trash" size={13} />
        </button>
      </div>
      {active && <Icon name="chev-right" size={12} className="shrink-0 text-pb-700" />}
    </div>
  );
}

function Pane({ title, count, subtitle, onAdd, search, onSearch, children, empty }) {
  return (
    <div className="flex flex-col bg-white border border-surface-200 rounded-xl overflow-hidden"
      style={{ boxShadow: '0 1px 3px rgba(11,20,48,.06), 0 1px 2px rgba(11,20,48,.04)' }}>
      <div className="px-3 py-3 border-b border-surface-200 shrink-0">
        <div className="flex items-center gap-2 mb-2">
          <span className="text-[12px] font-semibold text-ink-900">{title}</span>
          <span className="text-[10.5px] font-mono text-white bg-pb-900 rounded-full px-2 py-0.5">{count}</span>
          <button onClick={onAdd}
            className="ml-auto h-7 px-2 rounded-md bg-pb-50 text-pb-700 hover:bg-pb-100 text-[11px] font-semibold flex items-center gap-1">
            <Icon name="plus" size={12} /> Add
          </button>
        </div>
        {subtitle && <div className="text-[11px] text-ink-700/55 truncate">{subtitle}</div>}
        {onSearch !== undefined && (
          <div className="relative mt-2">
            <Icon name="search" size={13} className="absolute left-2.5 top-1/2 -translate-y-1/2 text-ink-700/35" />
            <input value={search} onChange={e => onSearch(e.target.value)} placeholder="ค้นหา..."
              className="w-full h-7 pl-8 pr-2 bg-surface-50 border border-surface-200 rounded-md text-[12px] outline-none focus:border-pb-500 focus:bg-white" />
          </div>
        )}
      </div>
      <div className="flex-1 overflow-y-auto pane-scroll px-1.5 py-1.5 space-y-0.5" style={{ minHeight: 0 }}>
        {React.Children.count(children) === 0
          ? <div className="px-3 py-10 text-center text-[12px] text-ink-700/40">{empty || 'ไม่มีข้อมูล'}</div>
          : children}
      </div>

function MediaDrawer({ open, mode, level, initial, context, onClose, onSave }) {
  const blank = { id:'', nameTh:'', nameEn:'', color:'#2D56D2', status:'active', hasPackage:false, packageIds:[], panelCount:'' };
  const [form, setForm] = useState(blank);
  const [pkgOpen, setPkgOpen] = useState(false);
  const [pkgSearch, setPkgSearch] = useState('');
  const pkgRef = useRef(null);
  const firstRef = useRef(null);
  useEffect(() => {
    if (!pkgOpen) return;
    const onDoc = (e) => { if (pkgRef.current && !pkgRef.current.contains(e.target)) setPkgOpen(false); };
    document.addEventListener('mousedown', onDoc);
    return () => document.removeEventListener('mousedown', onDoc);
  }, [pkgOpen]);
  useEffect(() => {
    if (open) {
      const seed = initial ? { ...initial } : { ...blank };
      // backward-compat: migrate legacy single packageId → packageIds[]
      if (seed.packageId && !seed.packageIds) seed.packageIds = [seed.packageId];
      if (!Array.isArray(seed.packageIds)) seed.packageIds = [];
      delete seed.packageId;
      setForm(seed);
      setPkgOpen(false);
      setPkgSearch('');
      setTimeout(() => firstRef.current && firstRef.current.focus(), 60);
    }
  }, [open, initial]);
  const update = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const togglePackage = (id) => setForm(f => {
    const cur = Array.isArray(f.packageIds) ? f.packageIds : [];
    return { ...f, packageIds: cur.includes(id) ? cur.filter(x => x !== id) : [...cur, id] };
  });
  const submit = (e) => { e.preventDefault(); if (!form.id || !form.nameTh) return; onSave(form); };
  const titles = {
    group: mode === 'create' ? 'เพิ่ม Media Group ใหม่' : 'แก้ไข Media Group',
    type:  mode === 'create' ? 'เพิ่ม Media Type ใหม่'  : 'แก้ไข Media Type',
  };
  const codeHint = {
    group: '2–4 ตัวอักษร · เช่น DGT, AIR, RTL',
    type:  'รหัสเฉพาะ · เช่น PBTV, BTS-SKY',
  };
  const codePh = {
    group: 'เช่น DGT',
    type:  'เช่น PBTV',
  };
  const namePh = {
    group: 'เช่น ดิจิทัล',
    type:  'เช่น Plan B TV',
  };
  const COLORS = ['#2D56D2','#F59E0B','#10B981','#7C3AED','#06B6D4','#EF4444','#0EA5E9'];
  return (
    <React.Fragment>
      <div onClick={onClose}
        className={`fixed inset-0 bg-black/30 z-30 transition-opacity ${open ? 'opacity-100' : 'pointer-events-none opacity-0'}`} />
      <aside className={`fixed right-0 top-0 bottom-0 w-[440px] bg-white border-l border-surface-200 z-40 flex flex-col transition-transform duration-200 ${open ? '' : 'translate-x-full'}`}
        style={{ boxShadow: '-8px 0 30px rgba(11,20,48,.10)' }}>
        <header className="h-14 px-5 border-b border-surface-200 flex items-center shrink-0">
          <div>
            <div className="text-[10px] uppercase tracking-wider font-semibold text-ink-700/45">{mode === 'create' ? 'New' : 'Edit'}</div>
            <div className="text-[15px] font-semibold text-ink-900 leading-tight">{titles[level]}</div>
          </div>
          <button onClick={onClose} className="ml-auto w-8 h-8 rounded-md hover:bg-surface-100 flex items-center justify-center text-ink-700/40">
            <Icon name="x" size={16} />
          </button>
        </header>
        {context && (level !== 'group') && (
          <div className="px-5 py-3 bg-pb-50/40 border-b border-surface-200 text-[11px] text-ink-700/65 flex items-center gap-1.5 flex-wrap">
            <span className="font-medium">{context.groupLabel}</span>
          </div>
        )}
        <form onSubmit={submit} className="flex-1 overflow-y-auto p-5 space-y-4">
          <Field label={`รหัส (${level === 'group' ? 'Group' : 'Type'} Code)`} hint={codeHint[level]}>
            <input ref={firstRef} value={form.id}
              onChange={e => update('id', e.target.value.toUpperCase().slice(0, 8))}
              disabled={mode === 'edit'} required
              placeholder={codePh[level]}
              className="w-full h-9 px-3 bg-surface-50 border border-surface-200 rounded-lg text-[14px] font-mono font-semibold uppercase tracking-wider disabled:bg-surface-100 disabled:text-ink-700/50 placeholder:opacity-40 placeholder:normal-case" />
          </Field>
          <Field label={`ชื่อ (${level === 'group' ? 'Group Name' : 'Type Name'})`}>
            <input value={form.nameTh} onChange={e => update('nameTh', e.target.value)} required
              placeholder={namePh[level]}
              className="w-full h-9 px-3 bg-surface-50 border border-surface-200 rounded-lg text-[13px] placeholder:opacity-40" />
          </Field>
          {level === 'type' && (
            <Field label="จำนวน Panel" hint="ระบุเป็นตัวเลขเท่านั้น">
              <input
                type="number"
                min="0"
                step="1"
                inputMode="numeric"
                value={form.panelCount ?? ''}
                onChange={e => {
                  const v = e.target.value.replace(/[^0-9]/g, '');
                  update('panelCount', v);
                }}
                onKeyDown={e => {
                  if (['e','E','+','-','.'].includes(e.key)) e.preventDefault();
                }}
                placeholder="เช่น 120"
                className="w-full h-9 px-3 bg-surface-50 border border-surface-200 rounded-lg text-[13px] font-mono placeholder:opacity-40" />
            </Field>
          )}
          {level === 'group' && (
            <Field label="สี (สำหรับ tag)">
              <div className="flex gap-2 flex-wrap">
                {COLORS.map(c => (
                  <button key={c} type="button" onClick={() => update('color', c)}
                    className="w-9 h-9 rounded-lg border-2 transition-transform hover:scale-105"
                    style={{ background: c, borderColor: form.color === c ? '#0B1430' : 'transparent' }} />
                ))}
              </div>
            </Field>
          )}
          {level === 'type' && (
            <Field label="Package" hint="ถ้าประเภทสื่อนี้ขายเป็นแพ็กเกจ ให้เลือกแพ็กเกจที่ผูกไว้">
              <div className="space-y-2">
                <label className="flex items-center gap-2 cursor-pointer p-2 rounded-lg border border-surface-200 hover:bg-surface-50 transition-colors">
                  <input
                    type="checkbox"
                    checked={!!form.hasPackage}
                    onChange={e => {
                      update('hasPackage', e.target.checked);
                      if (!e.target.checked) update('packageIds', []);
                    }}
                    className="w-4 h-4 rounded accent-[#2D56D2] shrink-0"
                  />
                  <span className="text-[13px] font-medium text-ink-900">มี Package</span>
                  <span className="text-[11px] text-ink-700/55 ml-auto">เปิดเพื่อเลือกแพ็กเกจ</span>
                </label>

                {form.hasPackage && (() => {
                  const selectedIds = form.packageIds || [];
                  const filtered = window.MEDIA_PACKAGES.filter(p =>
                    !pkgSearch.trim() ||
                    p.name.toLowerCase().includes(pkgSearch.toLowerCase()) ||
                    (p.description || '').toLowerCase().includes(pkgSearch.toLowerCase())
                  );
                  return (
                    <div className="pl-1 pt-1 space-y-1.5">
                      <label className="text-[11px] font-medium text-ink-700/65 block">
                        เลือกแพ็กเกจ (เลือกได้หลายรายการ)
                      </label>
                      <div ref={pkgRef} className="relative">
                        <button type="button" onClick={() => setPkgOpen(o => !o)}
                          className={`w-full min-h-[36px] py-1 pl-2 pr-8 bg-surface-50 border rounded-lg text-left text-[13px] outline-none transition-colors ${pkgOpen ? 'border-pb-500 bg-white' : 'border-surface-200 hover:border-surface-300'}`}>
                          {selectedIds.length === 0 ? (
                            <span className="text-ink-700/45 px-1">— เลือกแพ็กเกจ —</span>
                          ) : (
                            <span className="flex flex-wrap gap-1">
                              {selectedIds.map(pid => {
                                const pkg = window.MEDIA_PACKAGES.find(p => p.id === pid);
                                if (!pkg) return null;
                                return (
                                  <span key={pid}
                                    className="inline-flex items-center gap-1 h-6 pl-2 pr-1 rounded-md bg-pb-50 border border-pb-100 text-[11px] font-medium text-pb-700">
                                    {pkg.name}
                                    <span role="button"
                                      onClick={(e) => { e.stopPropagation(); togglePackage(pid); }}
                                      className="w-4 h-4 rounded hover:bg-pb-100 flex items-center justify-center text-pb-700/70 cursor-pointer">
                                      <Icon name="x" size={10} />
                                    </span>
                                  </span>
                                );
                              })}
                            </span>
                          )}
                          <Icon name="chev-down" size={12}
                            className={`absolute right-2.5 top-3 text-ink-700/40 transition-transform ${pkgOpen ? 'rotate-180' : ''}`} />
                        </button>

                        {pkgOpen && (
                          <div className="absolute left-0 right-0 top-full mt-1 z-20 bg-white border border-surface-200 rounded-lg overflow-hidden"
                            style={{ boxShadow:'0 12px 28px rgba(11,20,48,.14)' }}>
                            <div className="p-2 border-b border-surface-200 bg-surface-50/60">
                              <div className="relative">
                                <Icon name="search" size={12} className="absolute left-2.5 top-1/2 -translate-y-1/2 text-ink-700/40" />
                                <input
                                  value={pkgSearch}
                                  onChange={e => setPkgSearch(e.target.value)}
                                  placeholder="ค้นหาแพ็กเกจ..."
                                  className="w-full h-7 pl-7 pr-2 bg-white border border-surface-200 rounded-md text-[12px] outline-none focus:border-pb-500"
                                />
                              </div>
                            </div>
                            <div className="max-h-56 overflow-y-auto pane-scroll divide-y divide-surface-100">
                              {filtered.length === 0 ? (
                                <div className="px-3 py-6 text-center text-[12px] text-ink-700/45">ไม่พบแพ็กเกจ</div>
                              ) : filtered.map(p => {
                                const checked = selectedIds.includes(p.id);
                                return (
                                  <label key={p.id}
                                    className={`flex items-start gap-2 px-3 py-2 cursor-pointer transition-colors ${checked ? 'bg-pb-50/60' : 'hover:bg-surface-50'}`}>
                                    <input
                                      type="checkbox"
                                      checked={checked}
                                      onChange={() => togglePackage(p.id)}
                                      className="w-4 h-4 mt-0.5 rounded accent-[#2D56D2] shrink-0"
                                    />
                                    <div className="min-w-0 flex-1">
                                      <div className="text-[13px] font-medium text-ink-900 leading-tight">{p.name}</div>
                                      <div className="text-[11px] text-ink-700/60 mt-0.5 leading-snug">{p.description}</div>
                                    </div>
                                  </label>
                                );
                              })}
                            </div>
                            <div className="px-3 py-2 border-t border-surface-200 bg-surface-50/60 flex items-center justify-between">
                              <span className="text-[11px] text-ink-700/55">
                                เลือกแล้ว {selectedIds.length} / {window.MEDIA_PACKAGES.length}
                              </span>
                              <div className="flex gap-1.5">
                                {selectedIds.length > 0 && (
                                  <button type="button" onClick={() => update('packageIds', [])}
                                    className="h-6 px-2 text-[11px] font-medium text-ink-700/65 hover:text-ink-900 rounded-md hover:bg-surface-100">
                                    Clear
                                  </button>
                                )}
                                <button type="button" onClick={() => setPkgOpen(false)}
                                  className="h-6 px-2.5 text-[11px] font-semibold text-white bg-pb-500 hover:bg-pb-600 rounded-md">
                                  Done
                                </button>
                              </div>
                            </div>
                          </div>
                        )}
                      </div>
                    </div>
                  );
                })()}
              </div>
            </Field>
          )}
        </form>
        <footer className="p-4 border-t border-surface-200 flex gap-2 shrink-0">
          <Button variant="primary" icon="check" className="flex-1" onClick={submit}>
            {mode === 'create' ? 'บันทึก' : 'บันทึกการแก้ไข'}
          </Button>
          <Button variant="secondary" onClick={onClose}>ยกเลิก</Button>
        </footer>
      </aside>
    </React.Fragment>
  );
}

        style={{ background: `${tone}14`, color: tone }}><Icon name={icon} size={17} /></div>
      <div className="min-w-0">
        <div className="text-[10px] uppercase font-semibold tracking-wider text-ink-700/55">{label}</div>
        <div className="text-[18px] font-semibold tracking-tight" style={{ fontVariantNumeric: 'tabular-nums' }}>{value}</div>
      </div>
    </div>
  );
}

function MasterDataMediaScreen() {
  const [groups, setGroups] = useState(() => JSON.parse(JSON.stringify(window.MEDIA_GROUPS_SEED)));
  const [collapsed, setCollapsed] = useState(false);
  const [globalSearch, setGlobalSearch] = useState('');
  const [gSearch, setGSearch] = useState('');
  const [tSearch, setTSearch] = useState('');
  const [selectedGroupId, setSelectedGroupId] = useState('DIG');
  const [drawerState, setDrawerState] = useState({ open:false, mode:'create', level:'group', initial:null, context:null });
  const [deleteTarget, setDeleteTarget] = useState(null);
  const [aiOpen, setAiOpen] = useState(false);
  const [importOpen, setImportOpen] = useState(false);

  const filteredGroups = useMemo(() => {
    return groups.filter(g => {
      if (gSearch && !(g.nameTh.includes(gSearch) || (g.nameEn||'').toLowerCase().includes(gSearch.toLowerCase()) || g.id.toLowerCase().includes(gSearch.toLowerCase()))) return false;
      if (globalSearch) {
        const q = globalSearch.toLowerCase();
        const hits = g.id.toLowerCase().includes(q) || g.nameTh.includes(globalSearch) || (g.nameEn||'').toLowerCase().includes(q) ||
          g.types.some(t => t.id.toLowerCase().includes(q) || t.nameTh.includes(globalSearch) || (t.nameEn||'').toLowerCase().includes(q));
        if (!hits) return false;
      }
      return true;
    });
  }, [groups, gSearch, globalSearch]);

  const selectedGroup = filteredGroups.find(g => g.id === selectedGroupId) || filteredGroups[0];
  const types = selectedGroup ? selectedGroup.types : [];
  const filteredTypes = useMemo(() => {
    if (!tSearch) return types;
    return types.filter(t => t.nameTh.includes(tSearch) || (t.nameEn||'').toLowerCase().includes(tSearch.toLowerCase()) || t.id.toLowerCase().includes(tSearch.toLowerCase()));
  }, [types, tSearch]);

  const stats = useMemo(() => window.aggregateMedia(groups), [groups]);
  const openCreate = (level, ctx) => setDrawerState({ open:true, mode:'create', level, initial:null, context: ctx });
  const openEdit = (level, item, ctx) => setDrawerState({ open:true, mode:'edit', level, initial: { ...item }, context: ctx });
  const closeDrawer = () => setDrawerState(s => ({ ...s, open:false }));

  const saveEntity = (data) => {
    const { level, mode, initial } = drawerState;
    setGroups(prev => {
      const next = prev.map(g => ({ ...g, types: g.types.map(t => ({ ...t })) }));
      if (level === 'group') {
        if (mode === 'create') {
          if (next.find(g => g.id === data.id)) { alert(`รหัส ${data.id} มีอยู่แล้ว`); return prev; }
          next.push({ id: data.id, nameTh: data.nameTh, nameEn: data.nameEn || '', color: data.color, types: [] });
          setSelectedGroupId(data.id);
        } else {
          const g = next.find(g => g.id === initial.id);
          if (g) { g.nameTh = data.nameTh; g.nameEn = data.nameEn; g.color = data.color; }
        }
      }
      if (level === 'type') {
        const parentG = next.find(g => g.id === drawerState.context.groupId);
        const pCount = data.panelCount === '' || data.panelCount == null ? null : Number(data.panelCount);
        if (mode === 'create') {
          if (parentG.types.find(t => t.id === data.id)) { alert(`รหัส ${data.id} มีอยู่แล้ว`); return prev; }
          parentG.types.push({ id: data.id, nameTh: data.nameTh, nameEn: data.nameEn || '', status:'active', panelCount: pCount, hasPackage: !!data.hasPackage, packageIds: data.packageIds || [] });
        } else {
          const t = parentG.types.find(t => t.id === initial.id);
          if (t) Object.assign(t, { nameTh: data.nameTh, nameEn: data.nameEn, panelCount: pCount, hasPackage: !!data.hasPackage, packageIds: data.packageIds || [] });
        }
      }
      return next;
    });
    closeDrawer();
  };

  const confirmDelete = () => {
    const t = deleteTarget; if (!t) return;
    setGroups(prev => {
      const next = prev.map(g => ({ ...g, types: [...g.types] }));
      if (t.level === 'group') { const idx = next.findIndex(g => g.id === t.id); if (idx > -1) next.splice(idx, 1); setSelectedGroupId(next[0]?.id); }
      if (t.level === 'type') { const g = next.find(g => g.id === t.parentGId); const idx = g.types.findIndex(tt => tt.id === t.id); if (idx > -1) g.types.splice(idx, 1); }
      return next;
    });
    setDeleteTarget(null);
  };

  const leftPad = collapsed ? 68 : 256;

  return (
    <div className="min-h-screen flex bg-[#F7F9FC]" style={{ color: '#0B1430' }}>
      <main className="flex-1 min-h-screen flex flex-col transition-[margin-left] duration-200 lg:ml-64">
        <Topbar
          crumbs={[
            { label:'Home',        href:'dashboard.html' },
            { label:'Setting',     href:'settings-master.html' },
            { label:'Master Data', href:'settings-master.html' },
            'ประเภทสื่อ (Media)'
          ]}
          onToggleSidebar={() => window.collapseSidebar()}
          onToggleAi={() => setAiOpen(o => !o)}
          aiOpen={aiOpen}
        />

        <div className="flex-1 p-4 sm:p-6">
          <div className="max-w-[1600px] mx-auto space-y-4 flex flex-col" style={{ minHeight: 'calc(100vh - 96px)' }}>
            <div className="flex items-start justify-between gap-3 flex-wrap">
              <div>
                <h2 className="text-[22px] font-semibold text-ink-900 tracking-tight">ประเภทสื่อ · Master Data</h2>
                <p className="text-[12px] text-ink-700/55 mt-0.5">
                  จัดการประเภทสื่อตามโครงสร้าง 2 ระดับ: <b>Media Group → Media Type</b>
                </p>
              </div>
              <div className="flex gap-2">
                <Button variant="secondary" icon="download" onClick={() => setImportOpen(true)}>นำเข้า CSV</Button>
                <Button variant="ghost" icon="upload">ส่งออก</Button>
                <Button variant="primary" icon="plus" onClick={() => openCreate('group', null)}>เพิ่ม Group</Button>
              </div>
            </div>

            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
              <MStatTile icon="squares-2x2" label="Media Groups" value={stats.groups} tone="#2D56D2" />
              <MStatTile icon="archive-box" label="Media Types"  value={stats.types}  tone="#7C3AED" />
            </div>

            <div className="bg-white border border-surface-200 rounded-xl p-3"
              style={{ boxShadow: '0 1px 3px rgba(11,20,48,.06), 0 1px 2px rgba(11,20,48,.04)' }}>
              <div className="relative">
                <Icon name="search" size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-ink-700/35" />
                <input value={globalSearch} onChange={e => setGlobalSearch(e.target.value)}
                  placeholder="ค้นหาทุกระดับ — Group / Type / รหัส..."
                  className="w-full h-9 pl-9 pr-3 bg-surface-50 border border-surface-200 rounded-lg text-[13px]" />
              </div>
            </div>

            <div className="grid gap-3 flex-1" style={{ gridTemplateColumns: 'minmax(280px, 1fr) minmax(280px, 1.6fr)', minHeight: 480 }}>
              <Pane title="Media Group" count={filteredGroups.length} subtitle="หมวดใหญ่ของสื่อ"
                onAdd={() => openCreate('group', null)} search={gSearch} onSearch={setGSearch} empty="ไม่พบ Group">
                {filteredGroups.map(g => (
                  <PaneRow key={g.id} item={g} dot={g.color} meta={g.types.length} secondary={`${g.id} · ${g.nameEn}`}
                    active={selectedGroup?.id === g.id}
                    onSelect={() => setSelectedGroupId(g.id)}
                    onEdit={() => openEdit('group', g, null)}
                    onDelete={() => setDeleteTarget({ level:'group', id:g.id, label: `Group ${g.nameTh} (${g.id})`,
                      warning: g.types.length > 0 ? `จะลบ ${g.types.length} Types ใน Group นี้ด้วย` : null })} />
                ))}
              </Pane>

              <Pane title="Media Type" count={filteredTypes.length}
                subtitle={selectedGroup ? `ใน ${selectedGroup.nameTh}` : 'เลือก Group ก่อน'}
                onAdd={() => selectedGroup && openCreate('type', { groupId: selectedGroup.id, groupLabel: selectedGroup.nameTh })}
                search={tSearch} onSearch={setTSearch}
                empty={selectedGroup ? 'ยังไม่มี Type ในกลุ่มนี้ — กด "เพิ่ม"' : 'เลือก Group ก่อน'}>
                {filteredTypes.map(t => (
                  <PaneRow key={t.id} item={t}
                    meta={t.panelCount != null ? `${t.panelCount} panels` : '—'}
                    secondary={`${t.id} · ${t.nameEn}`}
                    active={false} onSelect={() => {}}
                    onEdit={() => openEdit('type', t, { groupId: selectedGroup.id, groupLabel: selectedGroup.nameTh })}
                    onDelete={() => setDeleteTarget({ level:'type', id:t.id, parentGId: selectedGroup.id, label: `Type ${t.nameTh} (${t.id})` })} />
                ))}
              </Pane>
            </div>
          </div>
        </div>
      </main>

      <MediaDrawer open={drawerState.open} mode={drawerState.mode} level={drawerState.level}
        initial={drawerState.initial} context={drawerState.context} onClose={closeDrawer} onSave={saveEntity} />
      <ConfirmDeleteMedia open={!!deleteTarget} target={deleteTarget}
        onClose={() => setDeleteTarget(null)} onConfirm={confirmDelete} />
      <MediaImportModal open={importOpen} onClose={() => setImportOpen(false)} />
      <AiPanel open={aiOpen} onClose={() => setAiOpen(false)} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<MasterDataMediaScreen />);
</script>
</body>
</html>
